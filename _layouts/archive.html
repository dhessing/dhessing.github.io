---
layout: default
---
<h1>Archive of posts with {{ page.type }} '{{ page.title }}'</h1>
<ul>
  {% for post in page.posts %}
  <li>
    <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span>

    <a  href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>

  </li>
  {% endfor %}
</ul>
