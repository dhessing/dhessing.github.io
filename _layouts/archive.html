---
layout: default
---
<h1 class="m-b-1">All posts about {{ page.title }}</h1>

<ul class="m-b-2">
  {% for post in page.posts %}
  <li>
    <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span>
    <small class="text-muted">• {% if post.subtitle %}{{ post.subtitle }} •{% endif %}</small>
    <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>
